<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#F0FDFA"/>
  <!-- Pie segments (center 50,50 radius 38) -->
  <!-- Segment 1: 40% — 270° to 54° (144°) -->
  <path d="M50,50 L50,12 A38,38 0 0,1 72,81 Z" fill="#0D9488"/>
  <!-- Segment 2: 35% — 54° to 180° (126°) -->
  <path d="M50,50 L72,81 A38,38 0 0,1 12,50 Z" fill="#14B8A6"/>
  <!-- Segment 3: 25% — 180° to 270° (90°) -->
  <path d="M50,50 L12,50 A38,38 0 0,1 50,12 Z" fill="#5EEAD4"/>
  <!-- Thin white dividers for clean look -->
  <line x1="50" y1="50" x2="50" y2="12" stroke="white" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="72" y2="81" stroke="white" stroke-width="1.5"/>
  <line x1="50" y1="50" x2="12" y2="50" stroke="white" stroke-width="1.5"/>
</svg>
