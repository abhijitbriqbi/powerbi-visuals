<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#F0FDFA"/>
  <!-- Background track — top semicircle, center (50,72) r=34, sweep=0 for top arc -->
  <path d="M16,72 A34,34 0 0,1 84,72" fill="none" stroke="#CBD5E1" stroke-width="10" stroke-linecap="round"/>
  <!-- Filled arc ~70% of 180° = 126° from left (180°) to 54° -->
  <!-- End point at 54°: x=50+34*cos(54°)=50+20=70, y=72-34*sin(54°)=72-27.5=44.5≈45 -->
  <path d="M16,72 A34,34 0 0,1 70,45" fill="none" stroke="#0D9488" stroke-width="10" stroke-linecap="round"/>
  <!-- Needle pointing at 70% position (54°) -->
  <line x1="50" y1="72" x2="67" y2="49" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="50" cy="72" r="5" fill="#0D9488"/>
  <!-- Min / Max tick marks -->
  <line x1="16" y1="72" x2="21" y2="72" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="72" x2="79" y2="72" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="38" x2="50" y2="43" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
</svg>
