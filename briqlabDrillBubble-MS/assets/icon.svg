<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#F0FDFA"/>
  <!-- Pie segments (center 45,45 radius 30) -->
  <!-- Segment 1: 40% — 270° to 54° (144°) -->
  <path d="M45,45 L45,15 A30,30 0 0,1 63,70 Z" fill="#0D9488"/>
  <!-- Segment 2: 35% — 54° to 180° (126°) -->
  <path d="M45,45 L63,70 A30,30 0 0,1 15,45 Z" fill="#14B8A6"/>
  <!-- Segment 3: 25% — 180° to 270° (90°) -->
  <path d="M45,45 L15,45 A30,30 0 0,1 45,15 Z" fill="#5EEAD4"/>
  <!-- Drill-down badge -->
  <circle cx="76" cy="76" r="16" fill="#0D9488"/>
  <path d="M76,67 L76,80 M70,73 L76,80 L82,73" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
