<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#F0FDFA"/>
  <!-- Donut segments (center 50,50 radius 36) -->
  <!-- Segment 1: 40% — 270° to 54° (144°) -->
  <path d="M50,50 L50,14 A36,36 0 0,1 71,79 Z" fill="#0D9488"/>
  <!-- Segment 2: 35% — 54° to 180° (126°) -->
  <path d="M50,50 L71,79 A36,36 0 0,1 14,50 Z" fill="#14B8A6"/>
  <!-- Segment 3: 25% — 180° to 270° (90°) -->
  <path d="M50,50 L14,50 A36,36 0 0,1 50,14 Z" fill="#5EEAD4"/>
  <!-- Center hole -->
  <circle cx="50" cy="50" r="18" fill="#F0FDFA"/>
</svg>
